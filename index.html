<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="utf-8">
<title>Autotrolej Live</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root {
    --bg: rgba(15, 18, 28, .90);
    --bg2: rgba(255,255,255,.07);
    --border: rgba(255,255,255,.10);
    --text: #f4f7fb;
    --muted: #9aa3b2;
    --blue: #3b82f6;
    --green: #10b981;
    --red: #ef4444;
    --orange: #f59e0b;
}

* {
    box-sizing: border-box;
}

html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
    font-family: "Plus Jakarta Sans", sans-serif;
    background: #0f111a;
    color: var(--text);
}

#map {
    width: 100%;
    height: 100%;
    z-index: 1;
}

.panel {
    position: absolute;
    left: 18px;
    top: 18px;
    width: 355px;
    max-height: calc(100vh - 36px);
    overflow-y: auto;
    z-index: 2000;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 18px;
    backdrop-filter: blur(18px);
    box-shadow: 0 25px 55px rgba(0,0,0,.48);
}

.sidebar {
    position: absolute;
    right: 18px;
    top: 18px;
    bottom: 18px;
    width: 440px;
    display: none;
    overflow-y: auto;
    z-index: 3000;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 18px;
    backdrop-filter: blur(18px);
    box-shadow: 0 25px 55px rgba(0,0,0,.54);
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
}

.logo {
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -.02em;
}

.badge {
    cursor: pointer;
    border-radius: 999px;
    padding: 6px 10px;
    background: var(--bg2);
    color: var(--muted);
    font-size: 11px;
    white-space: nowrap;
}

.badge.logged {
    color: var(--green);
    background: rgba(16,185,129,.15);
}

.status {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    padding: 10px;
    border-radius: 16px;
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(255,255,255,.05);
    color: var(--muted);
    font-size: 12px;
    margin-bottom: 12px;
}

.status span {
    color: var(--text);
    font-weight: 700;
}

input, select, button {
    width: 100%;
    margin-top: 8px;
    padding: 11px 13px;
    border-radius: 14px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,.07);
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
}

select option {
    background: #171b28;
}

button {
    border: none;
    background: var(--blue);
    font-weight: 800;
    cursor: pointer;
    box-shadow: 0 7px 18px rgba(59,130,246,.18);
}

button:hover {
    filter: brightness(1.08);
}

button.secondary {
    background: rgba(255,255,255,.10);
    box-shadow: none;
}

button.green {
    background: var(--green);
}

button.red {
    background: var(--red);
}

.row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
}

.hr {
    height: 1px;
    background: rgba(255,255,255,.09);
    margin: 14px 0;
}

.small {
    color: var(--muted);
    font-size: 12px;
}

.ok {
    color: var(--green);
    font-weight: 800;
}

.bad {
    color: var(--red);
    font-weight: 800;
}

.searchBox {
    position: relative;
}

.suggestions {
    display: none;
    position: absolute;
    top: calc(100% + 6px);
    left: 0;
    right: 0;
    z-index: 6000;
    max-height: 250px;
    overflow-y: auto;
    border-radius: 16px;
    background: #151927;
    border: 1px solid var(--border);
    box-shadow: 0 18px 40px rgba(0,0,0,.46);
}

.suggestion {
    padding: 11px 13px;
    cursor: pointer;
    border-bottom: 1px solid rgba(255,255,255,.06);
    font-size: 13px;
}

.suggestion:hover {
    background: rgba(255,255,255,.07);
}

.layers {
    position: absolute;
    right: 18px;
    top: 18px;
    z-index: 2100;
    display: flex;
    gap: 6px;
    padding: 6px;
    border-radius: 16px;
    background: var(--bg);
    border: 1px solid var(--border);
    backdrop-filter: blur(16px);
}

.layers button {
    width: auto;
    margin: 0;
    padding: 8px 12px;
    font-size: 11px;
}

.layers button.active {
    background: var(--blue);
}

.busIcon {
    color: #fff;
    font-weight: 900;
    font-size: 12px;
    padding: 5px 11px;
    border-radius: 999px;
    border: 2px solid rgba(255,255,255,.92);
    box-shadow: 0 7px 18px rgba(0,0,0,.46);
    white-space: nowrap;
}

.busIcon.idle {
    opacity: .58;
    filter: grayscale(.35);
    border-style: dashed;
}

.stationDot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #fff;
    border: 3px solid var(--blue);
    box-shadow: 0 0 14px rgba(59,130,246,.85);
}

.boardRow {
    display: grid;
    grid-template-columns: 64px 1fr 70px;
    gap: 9px;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid rgba(255,255,255,.07);
    font-size: 13px;
}

.stationRow {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    padding: 7px 0;
    border-bottom: 1px solid rgba(255,255,255,.06);
    font-size: 13px;
}

.trip {
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid rgba(255,255,255,.10);
}

.authOverlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 7000;
    align-items: center;
    justify-content: center;
    background: rgba(5,7,11,.68);
    backdrop-filter: blur(10px);
}

.authBox {
    width: min(380px, calc(100vw - 34px));
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 26px;
    padding: 25px;
    box-shadow: 0 28px 65px rgba(0,0,0,.62);
}

.leaflet-popup-content-wrapper {
    background: #151927 !important;
    color: white !important;
    border: 1px solid rgba(255,255,255,.10);
    border-radius: 16px !important;
}

.leaflet-popup-tip {
    background: #151927 !important;
}

.leaflet-popup-content {
    font-family: "Plus Jakarta Sans", sans-serif !important;
    font-size: 13px !important;
}

.leaflet-popup-content button {
    margin-top: 7px !important;
    padding: 8px 9px !important;
    font-size: 11px !important;
}

@media (max-width: 850px) {
    .panel {
        left: 10px;
        top: 10px;
        width: calc(100vw - 20px);
        max-height: 45vh;
    }

    .sidebar {
        left: 10px;
        right: 10px;
        top: auto;
        bottom: 10px;
        width: auto;
        height: 52vh;
    }

    .layers {
        right: 10px;
        top: auto;
        bottom: 10px;
    }
}
</style>
</head>

<body>

<div class="authOverlay" id="authOverlay">
    <div class="authBox">
        <h2 id="authTitle">Prijava</h2>
        <p class="small">Omiljene linije, stanice i tema spremaju se na tvoj račun.</p>
        <input id="authEmail" type="email" placeholder="E mail">
        <input id="authPassword" type="password" placeholder="Lozinka">
        <button id="authSubmit">Prijavi se</button>
        <button id="authSwitch" class="secondary">Nemam račun</button>
        <button id="authClose" class="secondary">Zatvori</button>
    </div>
</div>

<div class="layers">
    <button id="layerDark" onclick="setLayer('dark')">Tamna</button>
    <button id="layerLight" onclick="setLayer('light')">Svijetla</button>
    <button id="layerSat" onclick="setLayer('sat')">Satelit</button>
</div>

<div class="panel">
    <div class="header">
        <div class="logo">Autotrolej Live</div>
        <div class="badge" id="userBadge" onclick="openAuth()">Profil</div>
    </div>

    <div class="status">
        <div>Status<br><span id="status">Učitavanje</span></div>
        <div>Autobusa<br><span id="count">0</span></div>
        <div>Ažurirano<br><span id="lastUpdate">nikad</span></div>
        <div>Lokacija<br><span id="locStatus">isključena</span></div>
    </div>

    <button id="locBtn">Uključi moju lokaciju</button>

    <div class="row">
        <select id="radiusSelect">
            <option value="300">300 m</option>
            <option value="500" selected>500 m</option>
            <option value="1000">1000 m</option>
        </select>
        <button class="secondary" id="nearestBtn">Najbliža stanica</button>
    </div>

    <select id="lineFilter">
        <option value="all">Sve linije</option>
    </select>

    <button class="secondary" id="scheduleBtn">Vozni red odabrane linije</button>
    <button class="secondary" id="stationsBtn">Prikaži stanice</button>
    <button class="secondary" id="autoBtn">Auto osvježavanje: uključeno</button>

    <div class="hr"></div>

    <div class="searchBox">
        <input id="searchInput" placeholder="Pretraži liniju ili stanicu" autocomplete="off">
        <div class="suggestions" id="suggestions"></div>
    </div>
    <button id="searchBtn">Pretraži</button>

    <div class="hr"></div>

    <button class="green" id="favoritesBtn">Omiljeno</button>
    <button class="secondary" id="historyBtn">Povijest</button>
</div>

<div class="sidebar" id="sidebar">
    <button class="secondary" onclick="closeSidebar()">Zatvori</button>
    <div id="sidebarContent"></div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<script>
const SUPABASE_URL = "https://ajrjphpdvfibxaljnuxx.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFqcmpwaHBkdmZpYnhhbGpudXh4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MzYzODUsImV4cCI6MjA5NzExMjM4NX0.WpcOtE4Dm_xjZT7ZXHXGFsRrAaFOpi2L-sZqhFjBTrg";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const API = "https://api.autotrolej.hr/api/v1/voznired";
const WS_URL = "wss://api.autotrolej.hr/api/Hub/location";

const map = L.map("map", { zoomControl: false }).setView([45.3271, 14.4422], 12);
L.control.zoom({ position: "bottomright" }).addTo(map);

const layers = {
    dark: L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", { maxZoom: 19 }),
    light: L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", { maxZoom: 19 }),
    sat: L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}", { maxZoom: 19 })
};

let linije = {};
let stanice = {};
let buses = {};
let autoRefresh = true;
let showStations = false;
let selectedLine = localStorage.getItem("lastLine") || "all";
let followedBusId = null;

let userLat = null;
let userLng = null;
let userMarker = null;
let userAccuracy = null;
let radiusCircle = null;

let currentUser = null;
let cloudPrefs = {
    theme_preference: localStorage.getItem("theme") || "dark",
    favorite_lines: [],
    favorite_stations: []
};

const stationCluster = L.markerClusterGroup();

const statusEl = document.getElementById("status");
const countEl = document.getElementById("count");
const lastUpdateEl = document.getElementById("lastUpdate");
const locStatus = document.getElementById("locStatus");
const lineFilter = document.getElementById("lineFilter");
const sidebar = document.getElementById("sidebar");
const sidebarContent = document.getElementById("sidebarContent");
const suggestions = document.getElementById("suggestions");
const searchInput = document.getElementById("searchInput");
const userBadge = document.getElementById("userBadge");

function cap(s) {
    return s.charAt(0).toUpperCase() + s.slice(1);
}

function escapeHtml(value) {
    return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}

function setLayer(name) {
    Object.values(layers).forEach(layer => map.removeLayer(layer));
    layers[name].addTo(map);

    document.querySelectorAll(".layers button").forEach(button => button.classList.remove("active"));
    const active = document.getElementById("layer" + cap(name));
    if (active) active.classList.add("active");

    localStorage.setItem("theme", name);
    cloudPrefs.theme_preference = name;
    saveCloudPrefs();
}

setLayer(cloudPrefs.theme_preference);

function lineColor(line) {
    const n = String(line || "").replace(".", "");
    if (["1","1A","1B","2","2A","3","3A"].includes(n)) return "#3b82f6";
    if (["4","4A","5","5A","6","7","7A","8"].includes(n)) return "#10b981";
    if (["10","10A","11","12","12A","13","14","15"].includes(n)) return "#a855f7";
    if (["18","18A","18B","19","20","21","22","23","23A"].includes(n)) return "#f97316";
    if (["25","26","27","29","29A","30","32","32A","34","35","36","37"].includes(n)) return "#ef4444";
    return "#64748b";
}

function busIcon(line, idle) {
    return L.divIcon({
        className: "",
        html: `<div class="busIcon ${idle ? "idle" : ""}" style="background:${lineColor(line)}">${escapeHtml(line)}</div>`,
        iconSize: [54, 28]
    });
}

function stationIcon() {
    return L.divIcon({
        className: "",
        html: `<div class="stationDot"></div>`,
        iconSize: [14, 14]
    });
}

function formatTime(value) {
    if (!value) return "";
    return new Date(value).toLocaleTimeString("hr-HR", { hour: "2-digit", minute: "2-digit" });
}

function nowText() {
    return new Date().toLocaleTimeString("hr-HR");
}

function distance(a, b, c, d) {
    return map.distance([a, b], [c, d]);
}

function formatDistance(meters) {
    return meters < 1000 ? Math.round(meters) + " m" : (meters / 1000).toFixed(1) + " km";
}

function distanceFromMe(lat, lng) {
    if (userLat === null || userLng === null) {
        return `<span class="small">Uključi lokaciju za udaljenost od tebe.</span><br>`;
    }

    const d = distance(userLat, userLng, lat, lng);

    return `
        <b>Udaljenost od mene:</b> ${formatDistance(d)}<br>
    `;
}

function popupHtml(busId, key, lat, lng) {
    const line = linije[key];
    const lineNumber = line ? line.brojLinije : key;
    const routeName = line ? line.naziv : "Nepoznata linija";

    return `
        <b style="font-size:15px">Linija ${escapeHtml(lineNumber)}</b><br>
        <span class="small">${escapeHtml(routeName)}</span><br><br>
        ${distanceFromMe(lat, lng)}
        <button onclick="showSchedule('${escapeHtml(key)}')">Vozni red linije</button>
        <button onclick="followBus('${escapeHtml(busId)}')">Prati autobus</button>
        <button onclick="shareBus('${escapeHtml(busId)}')">Podijeli autobus</button>
        <button class="green" onclick="toggleFavorite('line','${escapeHtml(lineNumber)}','Linija ${escapeHtml(lineNumber)}')">★ Spremi liniju</button>
        <br><span class="small">Bus ID: ${escapeHtml(busId)} | ID linije: ${escapeHtml(key)}</span>
    `;
}

async function loadBaseData() {
    statusEl.textContent = "API";

    const [linesResponse, stationsResponse] = await Promise.all([
        fetch(API + "/linije").then(r => r.json()),
        fetch(API + "/stanice").then(r => r.json())
    ]);

    linije = linesResponse.res || {};
    stanice = stationsResponse.res || {};

    const uniqueLines = [...new Set(Object.values(linije).map(line => line.brojLinije).filter(Boolean))]
        .sort((a, b) => String(a).localeCompare(String(b), "hr", { numeric: true }));

    lineFilter.innerHTML = `<option value="all">Sve linije</option>`;

    uniqueLines.forEach(line => {
        const option = document.createElement("option");
        option.value = line;
        option.textContent = "Linija " + line;
        if (line === selectedLine) option.selected = true;
        lineFilter.appendChild(option);
    });

    buildStationMarkers();
}

function buildStationMarkers() {
    stationCluster.clearLayers();

    Object.values(stanice).forEach(station => {
        const lat = Number(station.gpsY);
        const lng = Number(station.gpsX);
        if (!Number.isFinite(lat) || !Number.isFinite(lng)) return;

        const marker = L.marker([lat, lng], { icon: stationIcon() });

        marker.bindPopup(`
            <b>${escapeHtml(station.naziv)}</b><br>
            <span class="small">${escapeHtml(station.smjer || "")}</span><br>
            <button onclick="showStationBoard(${station.id})">Live board</button>
            <button class="green" onclick="toggleFavorite('station','${station.id}','${escapeHtml(station.naziv)}')">★ Spremi stanicu</button>
        `);

        stationCluster.addLayer(marker);
    });
}

function updateVisibleBuses() {
    let visible = 0;

    Object.values(buses).forEach(bus => {
        const shouldShow = selectedLine === "all" || bus.lineNumber === selectedLine;

        if (shouldShow) {
            bus.marker.addTo(map);
            visible++;
        } else {
            map.removeLayer(bus.marker);
        }
    });

    countEl.textContent = visible;
}

function connectWs() {
    statusEl.textContent = "Spajanje";

    let ws;

    try {
        ws = new WebSocket(WS_URL);
    } catch (error) {
        statusEl.innerHTML = "<span class='bad'>WS greška</span>";
        console.error(error);
        return;
    }

    ws.onopen = () => {
        statusEl.innerHTML = "<span class='ok'>Spojeno</span>";
    };

    ws.onclose = () => {
        statusEl.innerHTML = "<span class='bad'>Prekinuto</span>";
        setTimeout(connectWs, 4000);
    };

    ws.onerror = error => {
        statusEl.innerHTML = "<span class='bad'>Greška</span>";
        console.error("WebSocket error", error);
    };

    ws.onmessage = event => {
        if (!autoRefresh) return;

        const rows = String(event.data || "").split("\n");

        rows.forEach(row => {
            if (!row.trim()) return;

            const p = row.split(";");
            if (p.length < 6) return;

            const busId = p[0];
            const lat = parseFloat(p[3]);
            const lng = parseFloat(p[4]);
            const key = p[5];

            if (!Number.isFinite(lat) || !Number.isFinite(lng)) return;

            const lineNumber = linije[key]?.brojLinije || key;

            let idle = false;
            if (buses[busId]) {
                idle = buses[busId].lat === lat && buses[busId].lng === lng;
            }

            if (!buses[busId]) {
                const marker = L.marker([lat, lng], {
                    icon: busIcon(lineNumber, idle)
                }).bindPopup(popupHtml(busId, key, lat, lng));

                buses[busId] = { marker, busId, key, lineNumber, lat, lng };
            } else {
                const bus = buses[busId];
                bus.marker.setLatLng([lat, lng]);
                bus.marker.setIcon(busIcon(lineNumber, idle));
                bus.marker.setPopupContent(popupHtml(busId, key, lat, lng));

                bus.key = key;
                bus.lineNumber = lineNumber;
                bus.lat = lat;
                bus.lng = lng;
            }

            if (followedBusId === busId) {
                map.panTo([lat, lng], { animate: true });
            }
        });

        lastUpdateEl.textContent = nowText();
        updateVisibleBuses();
    };
}

function closeSidebar() {
    sidebar.style.display = "none";
}

function openSidebar(html) {
    sidebar.style.display = "block";
    sidebarContent.innerHTML = html;
}

async function showSchedule(uniqueId) {
    if (!uniqueId || uniqueId === "all") {
        alert("Odaberi liniju.");
        return;
    }

    openSidebar("<h2>Učitavanje voznog reda...</h2>");

    try {
        const data = await fetch(API + "/polasciLinija?uniqueLinijaId=" + encodeURIComponent(uniqueId)).then(r => r.json());
        const line = data.res;

        if (!line || !line.polazakList || line.polazakList.length === 0) {
            openSidebar("<h2>Nema voznog reda.</h2>");
            return;
        }

        saveHistory("line", uniqueId, "Linija " + line.brojLinije);

        const tripsById = {};

        line.polazakList.forEach(item => {
            if (!tripsById[item.voznjaId]) tripsById[item.voznjaId] = [];
            tripsById[item.voznjaId].push(item);
        });

        const trips = Object.values(tripsById)
            .map(trip => trip.sort((a, b) => new Date(a.polazak) - new Date(b.polazak)))
            .sort((a, b) => new Date(a[0].polazak) - new Date(b[0].polazak));

        const now = new Date();
        const upcoming = trips.filter(trip => new Date(trip[0].polazak) >= now).slice(0, 7);

        let html = `
            <h2>Linija ${escapeHtml(line.brojLinije)}</h2>
            <p class="small">${escapeHtml(line.naziv || "")}</p>
            <button class="green" onclick="toggleFavorite('line','${escapeHtml(line.brojLinije)}','Linija ${escapeHtml(line.brojLinije)}')">★ Spremi liniju</button>
            <h3>Smjerovi i varijante</h3>
        `;

        Object.entries(linije)
            .filter(([key, l]) => l.brojLinije === line.brojLinije)
            .forEach(([key, l]) => {
                html += `<button class="secondary" onclick="showSchedule('${escapeHtml(key)}')">${escapeHtml(l.smjerNaziv || "")} | ${escapeHtml(l.naziv || "")}</button>`;
            });

        html += `<h3>Sljedeći polasci</h3>`;

        if (upcoming.length === 0) {
            html += `<p class="small">Nema više polazaka danas.</p>`;
        }

        upcoming.forEach(trip => {
            html += `<div class="trip"><b>Polazak: ${formatTime(trip[0].polazak)}</b>`;

            trip.forEach(item => {
                const station = stanice[item.stanicaId];
                const stationName = station ? station.naziv : "Stanica " + item.stanicaId;

                html += `
                    <div class="stationRow">
                        <span>${escapeHtml(stationName)}</span>
                        <b>${formatTime(item.polazak)}</b>
                    </div>
                `;
            });

            html += `</div>`;
        });

        openSidebar(html);

    } catch (error) {
        console.error(error);
        openSidebar("<h2>Greška pri učitavanju voznog reda.</h2>");
    }
}

async function showStationBoard(stationId) {
    openSidebar("<h2>Učitavanje stanice...</h2>");

    try {
        const data = await fetch(API + "/polasciStanica?stanicaId=" + encodeURIComponent(stationId)).then(r => r.json());
        const station = data.res;

        if (!station) {
            openSidebar("<h2>Nema podataka.</h2>");
            return;
        }

        saveHistory("station", stationId, station.naziv);

        const now = new Date();
        const list = (station.polazakList || [])
            .filter(item => new Date(item.polazak) >= now)
            .sort((a, b) => new Date(a.polazak) - new Date(b.polazak))
            .slice(0, 28);

        let html = `
            <h2>${escapeHtml(station.naziv)}</h2>
            <p class="small">${escapeHtml(station.smjer || "")}</p>
            <button class="green" onclick="toggleFavorite('station','${station.id}','${escapeHtml(station.naziv)}')">★ Spremi stanicu</button>
            <h3>Live board</h3>
        `;

        if (list.length === 0) {
            html += `<p class="small">Nema dolazaka.</p>`;
        }

        list.forEach(item => {
            const line = linije[item.uniqueLinijaId];
            const lineNumber = line ? line.brojLinije : item.linijaId;
            const mins = Math.max(0, Math.round((new Date(item.polazak) - now) / 60000));

            html += `
                <div class="boardRow">
                    <b style="color:${lineColor(lineNumber)}">${escapeHtml(lineNumber)}</b>
                    <span>${escapeHtml(line ? line.naziv : item.uniqueLinijaId)}</span>
                    <b class="${mins <= 4 ? "bad" : "ok"}">${mins} min</b>
                </div>
            `;
        });

        html += `<p class="small">Vrijeme dolaska je iz voznog reda jer javni API ne daje zasebno kašnjenje.</p>`;

        openSidebar(html);

    } catch (error) {
        console.error(error);
        openSidebar("<h2>Greška pri učitavanju stanice.</h2>");
    }
}

function nearestStation() {
    if (userLat === null || userLng === null) return null;

    let best = null;
    let bestDistance = Infinity;

    Object.values(stanice).forEach(station => {
        const lat = Number(station.gpsY);
        const lng = Number(station.gpsX);
        if (!Number.isFinite(lat) || !Number.isFinite(lng)) return;

        const d = distance(userLat, userLng, lat, lng);

        if (d < bestDistance) {
            best = station;
            bestDistance = d;
        }
    });

    return best;
}

function updateRadius() {
    if (userLat === null || userLng === null) return;

    const radius = Number(document.getElementById("radiusSelect").value);

    if (radiusCircle) map.removeLayer(radiusCircle);

    radiusCircle = L.circle([userLat, userLng], {
        radius,
        color: "#3b82f6",
        fillColor: "#3b82f6",
        fillOpacity: .08
    }).addTo(map);
}

function followBus(busId) {
    followedBusId = followedBusId === busId ? null : busId;
    const bus = buses[busId];

    if (bus) {
        map.setView([bus.lat, bus.lng], 16);
        bus.marker.openPopup();
    }
}

function shareBus(busId) {
    const url = location.href.split("#")[0] + "#bus=" + encodeURIComponent(busId);

    navigator.clipboard.writeText(url)
        .then(() => alert("Link za autobus je kopiran."))
        .catch(() => prompt("Kopiraj link:", url));
}

function saveHistory(type, value, label) {
    let history = JSON.parse(localStorage.getItem("history") || "[]");
    history = history.filter(item => String(item.value) !== String(value));
    history.unshift({ type, value, label });
    history = history.slice(0, 10);
    localStorage.setItem("history", JSON.stringify(history));
}

function localFavorites() {
    return JSON.parse(localStorage.getItem("favorites") || "[]");
}

function saveLocalFavorites(favorites) {
    localStorage.setItem("favorites", JSON.stringify(favorites));
}

function getAllFavorites() {
    if (!currentUser) return localFavorites();

    return [
        ...(cloudPrefs.favorite_lines || []).map(item => ({ type: "line", id: item.id, name: item.name })),
        ...(cloudPrefs.favorite_stations || []).map(item => ({ type: "station", id: item.id, name: item.name }))
    ];
}

function toggleFavorite(type, id, name) {
    if (currentUser) {
        const key = type === "line" ? "favorite_lines" : "favorite_stations";
        let arr = cloudPrefs[key] || [];

        if (arr.some(item => String(item.id) === String(id))) {
            arr = arr.filter(item => String(item.id) !== String(id));
        } else {
            const customName = prompt("Naziv favorita:", name) || name;
            arr.push({ id, name: customName });
        }

        cloudPrefs[key] = arr;
        saveCloudPrefs();
        return;
    }

    let favorites = localFavorites();

    if (favorites.some(item => item.type === type && String(item.id) === String(id))) {
        favorites = favorites.filter(item => !(item.type === type && String(item.id) === String(id)));
    } else {
        const customName = prompt("Naziv favorita:", name) || name;
        favorites.push({ type, id, name: customName });
    }

    saveLocalFavorites(favorites);
}

async function checkUser() {
    const { data } = await supabaseClient.auth.getSession();

    if (data.session) {
        currentUser = data.session.user;
        userBadge.textContent = currentUser.email.split("@")[0];
        userBadge.classList.add("logged");
        await loadCloudPrefs();
    }
}

async function loadCloudPrefs() {
    if (!currentUser) return;

    const { data, error } = await supabaseClient
        .from("user_preferences")
        .select("*")
        .eq("user_id", currentUser.id)
        .single();

    if (error && error.code === "PGRST116") {
        await supabaseClient.from("user_preferences").insert({
            user_id: currentUser.id,
            theme_preference: cloudPrefs.theme_preference,
            favorite_lines: [],
            favorite_stations: []
        });
        return;
    }

    if (!data) return;

    cloudPrefs = {
        theme_preference: data.theme_preference || cloudPrefs.theme_preference,
        favorite_lines: data.favorite_lines || [],
        favorite_stations: data.favorite_stations || []
    };

    setLayer(cloudPrefs.theme_preference);
}

async function saveCloudPrefs() {
    if (!currentUser) return;

    await supabaseClient.from("user_preferences").upsert({
        user_id: currentUser.id,
        theme_preference: cloudPrefs.theme_preference,
        favorite_lines: cloudPrefs.favorite_lines || [],
        favorite_stations: cloudPrefs.favorite_stations || [],
        updated_at: new Date().toISOString()
    });
}

function openAuth() {
    if (currentUser) {
        if (confirm("Odjaviti se?")) {
            supabaseClient.auth.signOut().then(() => location.reload());
        }
        return;
    }

    document.getElementById("authOverlay").style.display = "flex";
}

let authMode = "login";

document.getElementById("authSwitch").onclick = () => {
    authMode = authMode === "login" ? "register" : "login";
    document.getElementById("authTitle").textContent = authMode === "login" ? "Prijava" : "Registracija";
    document.getElementById("authSubmit").textContent = authMode === "login" ? "Prijavi se" : "Registriraj se";
    document.getElementById("authSwitch").textContent = authMode === "login" ? "Nemam račun" : "Imam račun";
};

document.getElementById("authClose").onclick = () => {
    document.getElementById("authOverlay").style.display = "none";
};

document.getElementById("authSubmit").onclick = async () => {
    const email = document.getElementById("authEmail").value.trim();
    const password = document.getElementById("authPassword").value;

    if (!email || !password) {
        alert("Upiši e mail i lozinku.");
        return;
    }

    const result = authMode === "login"
        ? await supabaseClient.auth.signInWithPassword({ email, password })
        : await supabaseClient.auth.signUp({ email, password });

    if (result.error) {
        alert(result.error.message);
    } else {
        location.reload();
    }
};

function setupSearch() {
    searchInput.addEventListener("input", () => {
        const query = searchInput.value.trim().toLowerCase();
        suggestions.innerHTML = "";

        if (!query) {
            suggestions.style.display = "none";
            return;
        }

        const items = [];

        Object.entries(linije).forEach(([key, line]) => {
            const text = `${line.brojLinije} ${line.naziv} ${line.smjerNaziv}`.toLowerCase();

            if (text.includes(query)) {
                items.push({ type: "line", key, label: `🚌 Linija ${line.brojLinije} | ${line.naziv}` });
            }
        });

        Object.values(stanice).forEach(station => {
            if (station.naziv && station.naziv.toLowerCase().includes(query)) {
                items.push({ type: "station", id: station.id, label: `🚏 ${station.naziv}` });
            }
        });

        if (items.length === 0) {
            suggestions.style.display = "none";
            return;
        }

        suggestions.style.display = "block";

        items.slice(0, 10).forEach(item => {
            const div = document.createElement("div");
            div.className = "suggestion";
            div.textContent = item.label;

            div.onclick = () => {
                suggestions.style.display = "none";
                searchInput.value = item.label;

                if (item.type === "line") {
                    selectedLine = linije[item.key].brojLinije;
                    lineFilter.value = selectedLine;
                    localStorage.setItem("lastLine", selectedLine);
                    updateVisibleBuses();
                    showSchedule(item.key);
                } else {
                    const station = stanice[item.id];
                    map.setView([station.gpsY, station.gpsX], 16);
                    showStationBoard(item.id);
                }
            };

            suggestions.appendChild(div);
        });
    });

    document.addEventListener("click", event => {
        if (event.target !== searchInput) suggestions.style.display = "none";
    });
}

document.getElementById("locBtn").onclick = () => {
    if (!navigator.geolocation) {
        alert("Preglednik ne podržava lokaciju.");
        return;
    }

    locStatus.textContent = "tražim";

    navigator.geolocation.watchPosition(position => {
        userLat = position.coords.latitude;
        userLng = position.coords.longitude;
        locStatus.textContent = "uključena";

        if (!userMarker) {
            userMarker = L.circleMarker([userLat, userLng], {
                radius: 8,
                color: "#fff",
                fillColor: "#3b82f6",
                fillOpacity: 1
            }).addTo(map).bindPopup("Moja lokacija");

            map.setView([userLat, userLng], 15);
        } else {
            userMarker.setLatLng([userLat, userLng]);
        }

        if (userAccuracy) map.removeLayer(userAccuracy);

        userAccuracy = L.circle([userLat, userLng], {
            radius: position.coords.accuracy || 30,
            color: "#3b82f6",
            fillColor: "#3b82f6",
            fillOpacity: .10
        }).addTo(map);

        updateRadius();

        Object.values(buses).forEach(bus => {
            bus.marker.setPopupContent(popupHtml(bus.busId, bus.key, bus.lat, bus.lng));
        });

    }, () => {
        locStatus.textContent = "odbijena";
        alert("Lokacija nije uključena.");
    }, {
        enableHighAccuracy: true,
        maximumAge: 5000
    });
};

document.getElementById("radiusSelect").onchange = updateRadius;

lineFilter.onchange = () => {
    selectedLine = lineFilter.value;
    localStorage.setItem("lastLine", selectedLine);
    updateVisibleBuses();
};

document.getElementById("scheduleBtn").onclick = () => {
    if (selectedLine === "all") {
        alert("Prvo odaberi liniju.");
        return;
    }

    const key = Object.keys(linije).find(id => linije[id].brojLinije === selectedLine);

    if (key) showSchedule(key);
};

document.getElementById("nearestBtn").onclick = () => {
    const station = nearestStation();

    if (!station) {
        alert("Prvo uključi lokaciju.");
        return;
    }

    map.setView([station.gpsY, station.gpsX], 16);
    showStationBoard(station.id);
};

document.getElementById("stationsBtn").onclick = () => {
    showStations = !showStations;

    if (showStations) {
        map.addLayer(stationCluster);
        document.getElementById("stationsBtn").textContent = "Sakrij stanice";
    } else {
        map.removeLayer(stationCluster);
        document.getElementById("stationsBtn").textContent = "Prikaži stanice";
    }
};

document.getElementById("autoBtn").onclick = () => {
    autoRefresh = !autoRefresh;
    document.getElementById("autoBtn").textContent = "Auto osvježavanje: " + (autoRefresh ? "uključeno" : "isključeno");
};

document.getElementById("searchBtn").onclick = () => {
    const first = suggestions.querySelector(".suggestion");
    if (first) first.click();
};

document.getElementById("favoritesBtn").onclick = () => {
    const favorites = getAllFavorites();

    let html = "<h2>Omiljeno</h2>";

    if (favorites.length === 0) {
        html += "<p class='small'>Nema favorita.</p>";
    }

    favorites.forEach(item => {
        html += `<button class="secondary" onclick="openFavorite('${escapeHtml(item.type)}','${escapeHtml(item.id)}')">★ ${escapeHtml(item.name)}</button>`;
    });

    openSidebar(html);
};

function openFavorite(type, id) {
    if (type === "station") {
        const station = stanice[id];

        if (station) {
            map.setView([station.gpsY, station.gpsX], 16);
        }

        showStationBoard(id);
    }

    if (type === "line") {
        selectedLine = id;
        lineFilter.value = id;
        localStorage.setItem("lastLine", id);
        updateVisibleBuses();

        const key = Object.keys(linije).find(k => linije[k].brojLinije === id);
        if (key) showSchedule(key);
    }
}

document.getElementById("historyBtn").onclick = () => {
    const history = JSON.parse(localStorage.getItem("history") || "[]");

    let html = "<h2>Povijest</h2>";

    if (history.length === 0) {
        html += "<p class='small'>Nema povijesti.</p>";
    }

    history.forEach(item => {
        html += `<button class="secondary" onclick="openHistory('${escapeHtml(item.type)}','${escapeHtml(item.value)}')">${escapeHtml(item.label)}</button>`;
    });

    openSidebar(html);
};

function openHistory(type, value) {
    if (type === "line") showSchedule(value);
    if (type === "station") showStationBoard(value);
}

map.on("click", event => {
    let best = null;
    let bestDistance = Infinity;

    Object.values(stanice).forEach(station => {
        const lat = Number(station.gpsY);
        const lng = Number(station.gpsX);
        if (!Number.isFinite(lat) || !Number.isFinite(lng)) return;

        const d = distance(event.latlng.lat, event.latlng.lng, lat, lng);

        if (d < bestDistance) {
            best = station;
            bestDistance = d;
        }
    });

    if (best && bestDistance < 500) {
        showStationBoard(best.id);
    }
});

async function init() {
    try {
        await checkUser();
        await loadBaseData();
        setupSearch();

        if (selectedLine !== "all") {
            lineFilter.value = selectedLine;
        }

        connectWs();

        if (location.hash.startsWith("#bus=")) {
            followedBusId = decodeURIComponent(location.hash.replace("#bus=", ""));
        }
    } catch (error) {
        statusEl.innerHTML = "<span class='bad'>Greška</span>";
        console.error(error);
    }
}

init();
</script>
