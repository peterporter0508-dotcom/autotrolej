<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="utf-8">
<title>Autotrolej Live</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/desktop.css">
<link rel="stylesheet" href="css/mobile.css">
</head>

<body>

<div class="authOverlay" id="authOverlay">
    <div class="authBox">
        <h2 id="authTitle">Prijava</h2>
        <p class="small">Omiljene linije, stanice i tema spremaju se na tvoj račun.</p>
        <input id="authEmail" type="email" placeholder="E mail">
        <input id="authPassword" type="password" placeholder="Lozinka">
        <button id="authSubmit">Prijavi se</button>
        <button id="authSwitch" class="secondary">Nemam račun</button>
        <button id="authClose" class="secondary">Zatvori</button>
    </div>
</div>

<div class="layers">
    <button id="layerDark" onclick="setLayer('dark')">Tamna</button>
    <button id="layerLight" onclick="setLayer('light')">Svijetla</button>
    <button id="layerSat" onclick="setLayer('sat')">Satelit</button>
</div>

<div class="panel">
    <div class="header">
        <div class="logo">Autotrolej Live</div>
        <div class="badge" id="userBadge" onclick="openAuth()">Profil</div>
    </div>

    <div class="status">
        <div>Status<br><span id="status">Učitavanje</span></div>
        <div>Autobusa<br><span id="count">0</span></div>
        <div>Ažurirano<br><span id="lastUpdate">nikad</span></div>
        <div>Lokacija<br><span id="locStatus">isključena</span></div>
    </div>

    <button id="locBtn">Uključi moju lokaciju</button>

    <div class="row">
        <select id="radiusSelect">
            <option value="300">300 m</option>
            <option value="500" selected>500 m</option>
            <option value="1000">1000 m</option>
        </select>
        <button class="secondary" id="nearestBtn">Najbliža stanica</button>
    </div>

    <select id="lineFilter">
        <option value="all">Sve linije</option>
    </select>

    <button class="secondary" id="scheduleBtn">Vozni red odabrane linije</button>
    <button class="secondary" id="stationsBtn">Prikaži stanice</button>
    <button class="secondary" id="autoBtn">Auto osvježavanje: uključeno</button>

    <div class="hr"></div>

    <div class="searchBox">
        <input id="searchInput" placeholder="Pretraži liniju ili stanicu" autocomplete="off">
        <div class="suggestions" id="suggestions"></div>
    </div>
    <button id="searchBtn">Pretraži</button>

    <div class="hr"></div>

    <button class="green" id="favoritesBtn">Omiljeno</button>
    <button class="secondary" id="historyBtn">Povijest</button>
</div>

<div class="sidebar bottom-sheet" id="sidebar">
    <button class="secondary" onclick="closeSidebar()">Zatvori</button>
    <div class="sheet-handle"></div>
    <div id="sidebarContent"></div>
</div>

<div id="map"></div>

<div class="mobile-bottom-nav" id="mobileBottomNav">
    <button class="mobile-tab active" id="tabMap">Map</button>
    <button class="mobile-tab" id="tabStations">Stations</button>
    <button class="mobile-tab" id="tabLines">Lines</button>
    <button class="mobile-tab" id="tabFavorites">Favorites</button>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/umd/supabase.min.js"></script>
<script src="js/config.js"></script>
<script src="js/state.js"></script>
<script src="js/utils.js"></script>
<script src="js/map.js"></script>
<script src="js/stations.js"></script>
<script src="js/buses.js"></script>
<script src="js/lines.js"></script>
<script src="js/search.js"></script>
<script src="js/favorites.js"></script>
<script src="js/auth.js"></script>
<script src="js/ui.js"></script>
<script src="js/mobile-ui.js"></script>
<script src="js/app.js"></script>

</body>
</html>
